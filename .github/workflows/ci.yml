name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use declared npm version
        run: npm install --global npm@11.3.0

      - name: Install dependencies
        run: npm ci

      - name: Run all checks
        run: npm run check:all
