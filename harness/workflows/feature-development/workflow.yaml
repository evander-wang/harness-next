document:
  dsl: "1.0.3"
  namespace: harness-next
  name: feature-development
  version: "0.1.0"
  title: 功能开发
  summary: 从需求澄清、审核到实现交付的本地 Agent 工作流。
  metadata:
    harness:
      routing:
        aliases:
          - generic-feature-development
        when:
          - 用户明确指定通用功能开发 Workflow
        notWhen:
          - 已存在更具体的技术栈 Workflow
      execution:
        maxStepAttempts: 3

input:
  schema:
    resource:
      endpoint: harness://models/feature-request.schema.json

do:
  - clarify-requirement:
      call: clarify-requirement

  - review-requirement:
      call: review-requirement
      metadata:
        harness:
          checks:
            - review-result-valid

  - decide-review:
      switch:
        - passed:
            when: .status == "passed"
            then: implement-change
        - needs-changes:
            then: clarify-requirement

  - implement-change:
      call: implement-change
      metadata:
        harness:
          checks:
            - implementation-complete

  - decide-implementation:
      switch:
        - passed:
            when: .status == "passed"
            then: end
        - needs-changes:
            then: implement-change

output:
  schema:
    resource:
      endpoint: harness://models/feature-result.schema.json
