document:
  dsl: "1.0.3"
  namespace: harness-next
  name: node-project-configuration
  version: "0.1.0"
  title: Node.js TypeScript 项目配置
  summary: 初始化新的 Node.js TypeScript 项目，或规范化当前已有项目的工程配置。
  metadata:
    harness:
      routing:
        aliases:
          - node-project-setup
          - node-project-standardization
        when:
          - 初始化新的 Node.js TypeScript 项目
          - 为已有项目补充 TypeScript、Lint、测试或构建配置
          - 统一 Node.js 版本、包管理器声明和 Lockfile
          - 修复项目 scripts、README、Docker 或 CI 配置不一致
          - 建立或规范化多环境配置和 Secret 管理方式
        notWhen:
          - 开发业务功能或修复业务代码缺陷
          - 只进行代码解释或代码审查
          - 只升级某一个普通业务依赖
      execution:
        maxStepAttempts: 3

input:
  schema:
    resource:
      endpoint: harness://models/node-project-configuration-request.schema.json

do:
  - analyze-project:
      call: analyze-node-project
      metadata:
        harness:
          checks:
            - node-project-plan-ready

  - decide-plan:
      switch:
        - passed:
            when: .status == "passed"
            then: configure-project
        - needs-changes:
            then: analyze-project

  - configure-project:
      call: configure-node-project

  - verify-project:
      call: verify-node-project
      metadata:
        harness:
          checks:
            - node-project-quality-gate

  - decide-quality:
      switch:
        - passed:
            when: .status == "passed"
            then: review-project
        - needs-changes:
            then: configure-project

  - review-project:
      call: review-node-project-configuration
      metadata:
        harness:
          checks:
            - node-project-review-result

  - decide-review:
      switch:
        - passed:
            when: .status == "passed"
            then: deliver-project
        - needs-changes:
            then: configure-project

  - deliver-project:
      call: deliver-node-project-configuration
      then: end

output:
  schema:
    resource:
      endpoint: harness://models/node-project-configuration-result.schema.json
